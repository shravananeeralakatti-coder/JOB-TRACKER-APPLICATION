<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Job Tracker</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .register-btn {
            background-color: #28a745;
        }

        .register-btn:hover {
            background-color: #218838;
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
            min-height: 1em;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Sign in for Job Tracker</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>

    <p id="message"></p>
</div>

<script>

// 🔐 LOGIN
function login() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.text())
    .then(response => {

        const message = document.getElementById("message");

        // ❌ USER NOT FOUND
        if (response === "User not found") {
            message.innerHTML = "⚠️ You are not registered. <b>Click Register</b>";
            message.style.color = "red";
            return; // 🔥 VERY IMPORTANT
        }

        // ❌ WRONG PASSWORD
        if (response === "Invalid password") {
            message.innerText = "❌ Incorrect password. Try again.";
            message.style.color = "orange";
            return;
        }

        // ✅ SUCCESS LOGIN
        localStorage.setItem("token", response);

        message.innerText = "✅ Login successful!";
        message.style.color = "green";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);
    });
}

// 📝 REGISTER
function register() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.text())
    .then(response => {
        document.getElementById("message").innerText = response;
    });
}

</script>

</body>
</html>
