# Database Configuration
# Render provides DB info via SPRING_DATASOURCE_URL or a single DATABASE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/job_tracker}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mysql212003}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Auto-detect dialect for MySQL or PostgreSQL
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# Port Configuration
server.port=${PORT:8080}
